<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Myanmar Postcode Directory | မြန်မာနိုင်ငံ စာပို့ကုဒ်</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold:       #d4a017;
    --gold-light: #f0c040;
    --gold-pale:  #f8e98a;
    --ruby:       #9b2335;
    --deep:       #0d0a05;
    --panel:      #1a1208;
    --surface:    #231a09;
    --border:     #3a2d12;
    --text:       #e8dcc0;
    --muted:      #9a8a6a;
    --white:      #fff8ee;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(212,160,23,.13) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(155,35,53,.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(212,160,23,.06) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Subtle grid pattern */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(212,160,23,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,160,23,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
  }

  .pagoda-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 16px rgba(212,160,23,.6));
    animation: floatGlow 4s ease-in-out infinite;
  }
  @keyframes floatGlow {
    0%,100% { transform: translateY(0);   filter: drop-shadow(0 0 16px rgba(212,160,23,.6)); }
    50%      { transform: translateY(-6px); filter: drop-shadow(0 0 28px rgba(212,160,23,.9)); }
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-pale), var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: .04em;
    line-height: 1.2;
  }

  .subtitle {
    font-family: 'Lora', serif;
    font-style: italic;
    color: var(--muted);
    margin-top: 8px;
    font-size: .95rem;
    letter-spacing: .06em;
  }

  .divider {
    width: 120px;
    height: 2px;
    margin: 20px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ── STATS BAR ── */
  .stats {
    position: relative; z-index: 10;
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    color: var(--gold-light);
    display: block;
  }
  .stat-label { font-size: .75rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }

  /* ── SEARCH / FILTER BAR ── */
  .controls {
    position: relative; z-index: 10;
    max-width: 900px;
    margin: 0 auto 30px;
    padding: 0 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--gold);
    font-size: 1rem;
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: .95rem;
    padding: 12px 14px 12px 42px;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
  }
  input[type="search"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,160,23,.15);
  }
  input[type="search"]::placeholder { color: var(--muted); }

  select {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: .9rem;
    padding: 12px 14px;
    outline: none;
    cursor: pointer;
    transition: border-color .25s;
    min-width: 180px;
  }
  select:focus { border-color: var(--gold); }
  select option { background: var(--panel); }

  .result-count {
    font-size: .82rem;
    color: var(--muted);
    font-style: italic;
    white-space: nowrap;
  }
  .result-count span { color: var(--gold); font-style: normal; font-weight: 600; }

  /* ── REGION SECTIONS ── */
  main {
    position: relative; z-index: 10;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  .region {
    margin-bottom: 36px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--panel);
    transition: opacity .2s;
  }
  .region.hidden { display: none; }

  .region-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 22px;
    background: linear-gradient(90deg, rgba(212,160,23,.12), transparent);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .region-header:hover { background: linear-gradient(90deg, rgba(212,160,23,.18), transparent); }

  .region-flag {
    font-size: 1.4rem;
  }

  .region-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold-light);
    letter-spacing: .05em;
    flex: 1;
  }

  .region-count {
    font-size: .75rem;
    background: rgba(212,160,23,.15);
    color: var(--gold);
    border: 1px solid rgba(212,160,23,.3);
    border-radius: 20px;
    padding: 2px 10px;
    font-family: 'Cinzel', serif;
  }

  .chevron {
    color: var(--gold);
    transition: transform .3s;
    font-size: .85rem;
  }
  .region.collapsed .chevron { transform: rotate(-90deg); }
  .region.collapsed .grid { display: none; }

  /* ── POSTCODE GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  .card {
    background: var(--surface);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: background .18s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--border);
    transition: background .18s;
  }
  .card:hover { background: rgba(212,160,23,.07); }
  .card:hover::before { background: var(--gold); }
  .card.hidden { display: none; }

  .city-name {
    font-family: 'Lora', serif;
    font-size: .95rem;
    color: var(--white);
    font-weight: 600;
  }
  .city-burmese {
    font-size: .8rem;
    color: var(--muted);
  }
  .postcode {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    color: var(--gold-light);
    margin-top: 4px;
    letter-spacing: .1em;
  }

  /* ── NO RESULTS ── */
  #no-results {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-style: italic;
  }
  #no-results .icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 10;
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: .8rem;
  }
  footer a { color: var(--gold); text-decoration: none; }

  /* ── SCROLL TOP ── */
  #scrollTop {
    position: fixed; bottom: 28px; right: 28px; z-index: 100;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--deep);
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(212,160,23,.4);
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  #scrollTop.visible { opacity: 1; pointer-events: auto; }
  #scrollTop:hover { background: var(--gold-light); }

  @media (max-width: 500px) {
    .stats { gap: 24px; }
    .controls { flex-direction: column; }
    select { min-width: 100%; }
  }
</style>
</head>

<header>
  <span class="pagoda-icon">🏯</span>

</div>

<div class="controls">

  </div>
  <select id="region-filter">

  </select>
  <span class="result-count" id="result-count"></span>
</div>

<main id="main"></main>
<div id="no-results">
  <span class="icon">🔎</span>
  No cities found. Try a different search.
</div>

<footer>
  Myanmar Postcode Directory &nbsp;·&nbsp; Data based on Myanmar Posts & Telecommunications
  &nbsp;·&nbsp; <a href="https://github.com">GitHub Pages</a>
</footer>

<button id="scrollTop" title="Back to top">▲</button>

// ── BUILD PAGE ────────────────────────────────────────────────────────────────

const main = document.getElementById('main');
const searchInput = document.getElementById('search');
const regionFilter = document.getElementById('region-filter');
const resultCount = document.getElementById('result-count');
const noResults = document.getElementById('no-results');
const totalCitiesEl = document.getElementById('total-cities');

let totalCities = 0;
DATA.forEach(r => totalCities += r.cities.length);
totalCitiesEl.textContent = totalCities;

DATA.forEach((region, ri) => {
  // populate filter
  const opt = document.createElement('option');
  opt.value = region.r;
  opt.textContent = `${region.e} ${region.r}`;
  regionFilter.appendChild(opt);

  // build section
  const sec = document.createElement('section');
  sec.className = 'region';
  sec.dataset.region = region.r;

  const hdr = document.createElement('div');
  hdr.className = 'region-header';
  hdr.innerHTML = `
    <span class="region-flag">${region.e}</span>
    <span class="region-name">${region.r}<br><small style="font-family:Lora,serif;font-weight:400;font-size:.75em;color:var(--muted);font-style:italic;">${region.rb}</small></span>
    <span class="region-count">${region.cities.length}</span>
    <span class="chevron">▼</span>
  `;
  hdr.addEventListener('click', () => sec.classList.toggle('collapsed'));

  const grid = document.createElement('div');
  grid.className = 'grid';

  region.cities.forEach(city => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.city = city.n.toLowerCase();
    card.dataset.burmese = city.b;
    card.dataset.postcode = city.p;
    card.innerHTML = `
      <span class="city-name">${city.n}</span>
      <span class="city-burmese">${city.b}</span>
      <span class="postcode">${city.p}</span>
    `;
    grid.appendChild(card);
  });

  sec.appendChild(hdr);
  sec.appendChild(grid);
  main.appendChild(sec);
});

// ── SEARCH & FILTER ───────────────────────────────────────────────────────────

function applyFilter() {
  const q = searchInput.value.toLowerCase().trim();
  const rf = regionFilter.value;
  let visible = 0;

  document.querySelectorAll('.region').forEach(sec => {
    const regionMatch = !rf || sec.dataset.region === rf;
    if (!regionMatch) { sec.classList.add('hidden'); return; }

    let sectionVisible = 0;
    sec.querySelectorAll('.card').forEach(card => {
      const match = !q ||
        card.dataset.city.includes(q) ||
        card.dataset.burmese.includes(q) ||
        card.dataset.postcode.includes(q);
      card.classList.toggle('hidden', !match);
      if (match) { sectionVisible++; visible++; }
    });

    const hasVisible = sectionVisible > 0;
    sec.classList.toggle('hidden', !hasVisible);

    // auto-expand when searching
    if (q && hasVisible) sec.classList.remove('collapsed');

    // update count badge
    const badge = sec.querySelector('.region-count');
    if (badge) badge.textContent = sectionVisible;
  });

  noResults.style.display = visible === 0 ? 'block' : 'none';
  resultCount.innerHTML = q || rf
    ? `<span>${visible}</span> result${visible !== 1 ? 's' : ''}`
    : '';
}

searchInput.addEventListener('input', applyFilter);
regionFilter.addEventListener('change', applyFilter);

// ── SCROLL TOP ────────────────────────────────────────────────────────────────
const scrollBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
